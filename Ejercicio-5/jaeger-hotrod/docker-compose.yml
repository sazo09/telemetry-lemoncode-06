services:

  jaeger:
    image: jaegertracing/all-in-one:1.57.0
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4318:4318"

  hotrod:
    image: jaegertracing/example-hotrod:1.57.0
    command: all
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    ports:
      - "8080:8080"
    depends_on:
      - jaeger
