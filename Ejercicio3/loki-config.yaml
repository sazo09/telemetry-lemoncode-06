---
# Configuracion de Loki en modo distribuido usando memberlist y almacenamiento en MinIO (S3).
server:
  # API HTTP de Loki expuesta para consultas y gestion.
  http_listen_address: 0.0.0.0
  http_listen_port: 3100

memberlist:
  # Descubrimiento entre nodos (read/write/backend) para coordinar el cluster.
  join_members: ["read", "write", "backend"]
  dead_node_reclaim_time: 30s
  gossip_to_dead_nodes_time: 15s
  left_ingesters_timeout: 30s
  bind_addr: ['0.0.0.0']
  bind_port: 7946
  gossip_interval: 2s

schema_config:
  # Define el esquema TSDB y la indexacion diaria de logs.
  configs:
    - from: 2023-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h
common:
  # Parametros compartidos por todos los componentes de Loki.
  path_prefix: /loki
  replication_factor: 1
  compactor_address: http://backend:3100
  storage:
    s3:
      # MinIO actua como backend S3 para datos e indices.
      endpoint: minio:9000
      insecure: true
      bucketnames: loki-data
      access_key_id: loki
      secret_access_key: supersecret
      s3forcepathstyle: true
  ring:
    kvstore:
      # El estado del anillo se almacena via memberlist (sin consul/etcd).
      store: memberlist
ruler:
  storage:
    s3:
      # Bucket dedicado para reglas/estado del ruler.
      bucketnames: loki-ruler

compactor:
  # Directorio temporal para tareas de compactacion.
  working_directory: /tmp/compactor